services:
  - type: web
    name: sigpac-backend
    env: python
    region: frankfurt
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COPERNICUS_USER
        sync: false
      - key: COPERNICUS_PASS
        sync: false
